<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berry — Meet people who actually try</title>
    <meta name="description" content="Berry is a curated, level-based dating platform where high-effort users meet high-effort users. No endless swipes, just meaningful matches." />
    <meta name="author" content="Berry" />
    <link rel="icon" href="/berry-logo.png" type="image/png" />

    <meta property="og:title" content="Berry — Meet people who actually try 🍓" />
    <meta property="og:description" content="No endless swipes. Just meaningful matches with people who put in effort." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@BerryApp" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Anti-FOUC: apply theme before React mounts. Must stay inline & blocking. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('berry-theme');
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
    <style>
      /* Paint background immediately using the same tokens as index.css */
      :root { background-color: hsl(240 5% 98%); }
      :root.dark { background-color: hsl(215 28% 7%); }
      html, body { background-color: hsl(var(--background, 240 5% 98%)); }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
