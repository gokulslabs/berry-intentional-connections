    <!-- Anti-FOUC: apply theme before React mounts. Must stay inline & blocking. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('berry-theme'); // 'light' | 'dark' | 'system' | null
          var mql = window.matchMedia('(prefers-color-scheme: dark)');
          var resolve = function () {
            if (stored === 'dark' || stored === 'light') return stored;
            return mql.matches ? 'dark' : 'light';
          };
          var apply = function (theme) {
            var root = document.documentElement;
            root.classList.remove('light', 'dark');
            root.classList.add(theme);
            root.style.colorScheme = theme;
          };
          apply(resolve());
          // When following system, react to OS changes live — even before React hydrates.
          if (stored !== 'dark' && stored !== 'light') {
            var onChange = function () { apply(resolve()); };
            mql.addEventListener ? mql.addEventListener('change', onChange) : mql.addListener(onChange);
          }
        } catch (e) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
    <style>
      /* Paint background immediately using the same tokens as index.css */
      :root { background-color: hsl(240 5% 98%); }
      :root.dark { background-color: hsl(215 28% 7%); }
      html, body { background-color: hsl(var(--background, 240 5% 98%)); }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
